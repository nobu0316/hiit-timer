<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HIIT Timer</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="app" aria-live="polite">
    <section class="timer-panel">
      <header class="app-header">
        <p class="eyebrow">HIIT TIMER</p>
        <h1>インターバルトレーニング</h1>
      </header>

      <div class="status-area">
        <p id="phaseLabel" class="phase-label">待機中</p>
        <p id="timeLeft" class="time-left">00:00</p>
        <p id="setInfo" class="set-info">セット 0 / 0</p>
      </div>

      <div class="controls" aria-label="タイマー操作">
        <button id="startButton" type="button" class="primary-button">スタート</button>
        <button id="pauseButton" type="button" disabled>一時停止</button>
        <button id="resetButton" type="button">リセット</button>
      </div>
    </section>

    <section class="settings" aria-label="タイマー設定">
      <div class="field-grid">
        <label>
          <span>運動時間</span>
          <input id="workInput" type="number" min="1" max="3600" value="20">
          <small>秒</small>
        </label>

        <label>
          <span>休憩時間</span>
          <input id="restInput" type="number" min="0" max="3600" value="10">
          <small>秒</small>
        </label>

        <label>
          <span>セット数</span>
          <input id="setsInput" type="number" min="1" max="99" value="8">
          <small>回</small>
        </label>

        <label>
          <span>開始前</span>
          <input id="countdownInput" type="number" min="0" max="300" value="5">
          <small>秒</small>
        </label>
      </div>

      <fieldset class="target-field">
        <legend>対象部位</legend>
        <div id="targetButtons" class="target-buttons" role="group" aria-label="対象部位">
          <button type="button" class="target-button" data-target="全身" aria-pressed="true">全身</button>
          <button type="button" class="target-button" data-target="脚" aria-pressed="false">脚</button>
          <button type="button" class="target-button" data-target="腹筋" aria-pressed="false">腹筋</button>
          <button type="button" class="target-button" data-target="胸・腕" aria-pressed="false">胸・腕</button>
          <button type="button" class="target-button" data-target="背中" aria-pressed="false">背中</button>
          <button type="button" class="target-button" data-target="体幹" aria-pressed="false">体幹</button>
          <button type="button" class="target-button" data-target="有酸素寄り" aria-pressed="false">有酸素寄り</button>
          <button type="button" class="target-button" data-target="その他" aria-pressed="false">その他</button>
        </div>
      </fieldset>

      <label class="sound-toggle">
        <input id="soundToggle" type="checkbox" checked>
        <span>音で通知</span>
      </label>

      <p id="wakeLockStatus" class="wake-lock-status" hidden>
        画面ロック防止はこのブラウザでは利用できません
      </p>
    </section>

    <section class="history" aria-label="実績ログ">
      <div class="history-header">
        <div>
          <p class="eyebrow">LOG</p>
          <h2>実績ログ</h2>
        </div>
        <button id="clearHistoryButton" type="button" class="secondary-button">全削除</button>
      </div>

      <div class="stats-grid" aria-label="実績サマリー">
        <div class="stat-item">
          <span>直近実施日</span>
          <strong id="latestDateStat">-</strong>
        </div>
        <div class="stat-item">
          <span>前回から</span>
          <strong id="daysSinceStat">-</strong>
        </div>
        <div class="stat-item">
          <span>今月の実施回数</span>
          <strong id="monthlyCountStat">0回</strong>
        </div>
      </div>
      <div id="monthlyTargetStats" class="target-stats" aria-label="今月の部位別実施回数"></div>

      <ul id="historyList" class="history-list"></ul>
      <p id="emptyHistory" class="empty-history">まだ実績がありません</p>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
